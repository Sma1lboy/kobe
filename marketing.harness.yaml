project:
  id: kobe
  root: .
  marketingRoot: packages/branding/marketing

organization:
  id: kobe
  name: kobe

skillDistribution:
  upstream: sma1lboy/brand-studio
  fork: CodeFox-Repo/brand-studio
  scope: repo
  ref: main

theme:
  path: packages/branding/marketing/theme.md
  campaigns: packages/branding/marketing/campaigns
  references: packages/branding/marketing/references

skills:
  image: gpt-image
  design: frontend-design

campaign:
  name: mars-kobe
  path: packages/branding/marketing/campaigns/mars-kobe.campaign.yaml

artifacts:
  scratch: packages/branding/.harness/out
  approved: public/brand

state:
  plans: packages/branding/marketing/plans
  assetIndex: public/brand/asset-state.yaml
  accepted: public/brand/accepted.yaml
  directoryStateFile: asset-state.yaml

portfolios:
  release:
    accepted: public/brand/portfolios/release/accepted.yaml
    assetState: public/brand/portfolios/release/asset-state.yaml
    patterns: public/brand/portfolios/release/patterns.md
  promo:
    accepted: public/brand/portfolios/promo/accepted.yaml
    assetState: public/brand/portfolios/promo/asset-state.yaml
    patterns: public/brand/portfolios/promo/patterns.md

sources:
  assetRoots:
    - packages/branding/marketing
    - public/brand
  relatedRepos: []

policy:
  requireHumanApprovalBeforeRender: true
  requireHumanApprovalBeforeStateUpdate: true
  allowRootWorkspaceBootstrap: false
