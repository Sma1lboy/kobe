version: "1.0.4"

portfolio:
  id: "kobe"
  name: "kobe"
  version: "1.0.0"

brand:
  id: "kobe"
  name: "kobe"

provider:
  gateway: "gpt-image-skill"
  model: "gpt-image-2"
  params:
    seed_strategy: "per_asset"
    seed: 20260618
    quality: "high"
    timeout_seconds: 180
    retry_attempts: 2
    output_format: "png"
    background: "opaque"
    moderation: "auto"

global:
  color:
    ink: { $value: "#191713", $type: "color" }
    paper: { $value: "#F7F1E8", $type: "color" }
    lunar-dust: { $value: "#D8C8B0", $type: "color" }
    clay: { $value: "#D87857", $type: "color" }
    shell: { $value: "#EBBBAC", $type: "color" }
    graphite: { $value: "#3A342D", $type: "color" }
    copper: { $value: "#A85E34", $type: "color" }
    signal-blue: { $value: "#2F6F9F", $type: "color" }
  typography:
    display-face:
      $value: "large crisp warm grotesk title typography, restrained tracking, highly legible launch copy"
      $type: "fontFamily"
    terminal-face:
      $value: "monospaced terminal UI typography, compact pane labels, readable task names, no fake paragraph walls"
      $type: "fontFamily"
  style-fragment:
    lunar-field-computing:
      $value: "cinematic lunar field-computing launch image, moon surface as the environment around the product, rugged terminal workstation, suited adult mission operator using the terminal, Earth glow in the black sky, believable lunar hardware, antenna mast, lander struts, cable harnesses, dust, hard vacuum shadows"
      $type: "text"
    tui-product-focus:
      $value: "use the provided kobe TUI screenshot as the canonical product reference. Preserve the actual layout language: full-height left task rail with KOBE v0.7.33, Working sessions and Archives tabs, project rows, keys legend footer; large central Claude Code engine pane with pixel icon header and blank prompt area; right column split into file tree above and shell pane below; thin tmux borders, dark graphite panels, clay-orange focus lines and labels, muted gray monospace text"
      $type: "text"
    warm-technical-palette:
      $value: "warm paper and lunar-dust background tones, clay and shell highlights, graphite and ink terminal panels, copper hardware edges, one restrained blue signal accent, quiet premium technology mood, not neon cyberpunk"
      $type: "text"
    launch-hierarchy:
      $value: "product-led social launch composition with a dramatic oversized headline lockup in clean black sky. The canvas is a large 2400 x 1260 PNG. Place the exact lowercase word \"kobe\" large and poster-like, but fully inside a top-left safe area: leave visible black margin above and left of every letter, no cropped letters, no letter touching the frame edge. Keep the full word inside approximately the left 42 percent and upper 22 percent of the canvas. Put the secondary copy \"parallel agents, one terminal\" directly below it at smaller size. Make the terminal screen large enough to read as the actual kobe TUI, not a blurred prop"
      $type: "text"
    cinematic-craft:
      $value: "wide 2400 by 1260 high-resolution hero card, pulled-back medium-wide camera rather than close-up, terminal screen is the dominant object, astronaut operator is smaller in the right-side midground and occupies no more than about 22 percent of canvas width, helmet is much smaller than the terminal screen and does not touch the top or right frame edge, oversized title allowed, no edge-cropped headline, screen-first product framing, strong moon-horizon silhouette, crisp visor reflection of terminal panes, tactile suit fabric, brushed metal workstation, controlled dust texture, sharp foreground, restrained atmospheric glow"
      $type: "text"
  negative:
    global-exclude:
      $value: "cropped headline, cropped kobe wordmark, letters cut off at the frame edge, giant KOBE text touching the top edge, huge foreground astronaut helmet, astronaut faceplate filling the right side, person touching frame edges, terminal screen smaller than helmet, official Anthropic logo, standalone Claude logo outside the terminal UI, fake sponsor logos, basketball imagery, celebrity likeness, robot mascot, glossy SaaS cards, browser chrome, generic hologram dashboard, unreadable terminal gibberish, excessive neon, purple-blue gradient, crowded sci-fi HUD, malformed main headline, watermark"
      $type: "text"
  reference:
    actual-tui: { $value: "workspace/products/kobe/kobe/references/kobe-tui-actual.png", $type: "asset" }

alias:
  style:
    lunar-launch-hero:
      $type: "composite"
      $value:
        prompt: "{global.style-fragment.lunar-field-computing}, {global.style-fragment.tui-product-focus}, {global.style-fragment.warm-technical-palette}, {global.style-fragment.launch-hierarchy}, {global.style-fragment.cinematic-craft}"
        palette:
          - "{global.color.ink}"
          - "{global.color.paper}"
          - "{global.color.lunar-dust}"
          - "{global.color.clay}"
          - "{global.color.shell}"
          - "{global.color.graphite}"
          - "{global.color.copper}"
          - "{global.color.signal-blue}"
        typography: "{global.typography.display-face}; {global.typography.terminal-face}"
        negative: "{global.negative.global-exclude}"
        references: ["{global.reference.actual-tui}"]
