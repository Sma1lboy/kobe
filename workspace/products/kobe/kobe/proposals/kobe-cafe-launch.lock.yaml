version: "1.1.0"

portfolio:
  id: "kobe"
  name: "kobe"
  version: "1.0.0"

brand:
  id: "kobe"
  name: "kobe"

provider:
  gateway: "gpt-image-skill"
  model: "gpt-image-2"
  params:
    seed_strategy: "per_asset"
    seed: 20260618
    quality: "high"
    timeout_seconds: 180
    retry_attempts: 2
    output_format: "png"
    background: "opaque"
    moderation: "auto"

global:
  color:
    ink: { $value: "#191713", $type: "color" }
    paper: { $value: "#F7F1E8", $type: "color" }
    lunar-dust: { $value: "#D8C8B0", $type: "color" }
    warm-stone: { $value: "#D8C8B0", $type: "color" }
    clay: { $value: "#D87857", $type: "color" }
    shell: { $value: "#EBBBAC", $type: "color" }
    graphite: { $value: "#3A342D", $type: "color" }
    copper: { $value: "#A85E34", $type: "color" }
    terminal: { $value: "#11161C", $type: "color" }
    cafe-wood: { $value: "#6F4632", $type: "color" }
    cafe-cream: { $value: "#E9D7C2", $type: "color" }
    signal-blue: { $value: "#2F6F9F", $type: "color" }
  typography:
    display-face:
      $value: "large crisp lowercase warm grotesk title typography, restrained tracking, highly legible launch copy"
      $type: "fontFamily"
    terminal-face:
      $value: "monospaced terminal UI typography, compact pane labels, readable task names, no fake paragraph walls"
      $type: "fontFamily"
  style-fragment:
    lunar-field-computing:
      $value: "cinematic lunar field-computing launch image, moon surface as the environment around the product, rugged terminal workstation, suited adult mission operator using the terminal, Earth glow in the black sky, believable lunar hardware, antenna mast, lander struts, cable harnesses, dust, hard vacuum shadows"
      $type: "text"
    clean-product-promo:
      $value: "restrained product launch poster for a terminal developer tool, no narrative scene, no characters, no props. Use a simple editorial composition: matte dark graphite background, one large real terminal product surface, warm clay accents, generous negative space, and a clear poster-like headline/subtitle lockup"
      $type: "text"
    cafe-product-promo:
      $value: "photoreal lifestyle product hero in a modern quiet cafe, one fictional adult developer using a laptop at a small table, warm window light, coffee cup and notebook as restrained context, laptop screen facing the viewer and clearly showing the kobe terminal TUI"
      $type: "text"
    tui-product-focus:
      $value: "use the provided kobe TUI screenshot as the canonical product reference. Preserve the actual layout language: full-height left task rail with KOBE v0.7.33, Working sessions and Archives tabs, one selected project row, keys legend footer; large central Claude Code engine pane with pixel icon header, prompt area, and PR line; right column split into file tree above and shell pane below; thin tmux borders, dark graphite panels, clay-orange focus lines and labels, muted gray monospace text"
      $type: "text"
    warm-technical-palette:
      $value: "warm paper and stone background tones, clay and shell highlights, graphite and ink terminal panels, one restrained blue signal accent, quiet premium technology mood, not neon cyberpunk"
      $type: "text"
    launch-hierarchy:
      $value: "wide 2400 x 1260 product hero card. Place the exact lowercase word \"kobe\" very large and poster-like, but fully inside a top-left safe area: leave visible margin above and left of every letter, no cropped letters, no letter touching the frame edge. Put the secondary copy \"parallel agents, one terminal\" directly below it at smaller size. The real terminal screenshot is the dominant product surface, large enough to read as the actual kobe TUI, not a blurred prop"
      $type: "text"
    cinematic-craft:
      $value: "wide 2400 by 1260 high-resolution hero card, pulled-back medium-wide camera rather than close-up, terminal screen is the dominant object, astronaut operator is smaller in the right-side midground and occupies no more than about 22 percent of canvas width, helmet is much smaller than the terminal screen and does not touch the top or right frame edge, oversized title allowed, no edge-cropped headline, screen-first product framing, strong moon-horizon silhouette, crisp visor reflection of terminal panes, tactile suit fabric, brushed metal workstation, controlled dust texture, sharp foreground, restrained atmospheric glow"
      $type: "text"
    product-craft:
      $value: "ordinary clean promotional image, product-first framing, screenshot shown in a precise terminal window or floating screen plane with subtle shadow, sharp foreground, crisp UI structure, restrained texture, no people, no moon, no hardware, no cinematic environment, no surreal elements"
      $type: "text"
    cafe-craft:
      $value: "wide 2400 x 1260 high-resolution hero card, eye-level or slightly over-shoulder cafe photo composition, one person only, face not prominent, laptop screen is large enough to read as the actual kobe TUI with left task rail, central engine pane, right file tree, and lower shell pane. Keep the screen content crisp and terminal-native, not a browser page, not a generic AI dashboard. Add a small clean launch lockup reading \"kobe\" and \"parallel agents, one terminal\" in a safe empty area without cropping"
      $type: "text"
  negative:
    global-exclude:
      $value: "cropped headline, cropped kobe wordmark, letters cut off at the frame edge, giant KOBE text touching the top edge, huge foreground astronaut helmet, astronaut faceplate filling the right side, person touching frame edges, terminal screen smaller than helmet, official Anthropic logo, standalone Claude logo outside the terminal UI, fake sponsor logos, basketball imagery, celebrity likeness, robot mascot, glossy SaaS cards, browser chrome, generic hologram dashboard, unreadable terminal gibberish, excessive neon, purple-blue gradient, crowded sci-fi HUD, malformed main headline, watermark"
      $type: "text"
    clean-exclude:
      $value: "cropped headline, cropped kobe wordmark, letters cut off at the frame edge, giant KOBE text touching the top edge, astronaut, moon, lunar surface, planet, lander, rocket, helmet, human character, mission operator, robot mascot, official Anthropic logo, standalone Claude logo outside the terminal UI, fake sponsor logos, basketball imagery, celebrity likeness, glossy SaaS cards, browser chrome, generic hologram dashboard, unreadable terminal gibberish, excessive neon, purple-blue gradient, crowded sci-fi HUD, malformed main headline, watermark"
      $type: "text"
    cafe-exclude:
      $value: "more than one person, recognizable celebrity or real-person likeness, face close-up, laptop screen hidden, laptop screen too small, screen turned away from viewer, generic dashboard, browser chrome, glossy SaaS cards, fake sponsor logos, official Anthropic logo, standalone Claude logo outside the terminal UI, unreadable terminal gibberish, cropped headline, cropped kobe wordmark, basketball imagery, robot mascot, moon, astronaut, neon cyberpunk, purple-blue gradient, watermark"
      $type: "text"
  reference:
    actual-tui: { $value: "workspace/products/kobe/kobe/references/kobe-tui-actual.png", $type: "asset" }
    clean-tui: { $value: "workspace/products/kobe/kobe/references/kobe-tui-clean.png", $type: "asset" }

alias:
  style:
    lunar-launch-hero:
      $type: "composite"
      $value:
        prompt: "{global.style-fragment.lunar-field-computing}, {global.style-fragment.tui-product-focus}, {global.style-fragment.warm-technical-palette}, {global.style-fragment.launch-hierarchy}, {global.style-fragment.cinematic-craft}"
        palette:
          - "{global.color.ink}"
          - "{global.color.paper}"
          - "{global.color.lunar-dust}"
          - "{global.color.clay}"
          - "{global.color.shell}"
          - "{global.color.graphite}"
          - "{global.color.copper}"
          - "{global.color.signal-blue}"
        typography: "{global.typography.display-face}; {global.typography.terminal-face}"
        negative: "{global.negative.global-exclude}"
        references: ["{global.reference.actual-tui}"]
    clean-product-hero:
      $type: "composite"
      $value:
        prompt: "{global.style-fragment.clean-product-promo}, {global.style-fragment.tui-product-focus}, {global.style-fragment.warm-technical-palette}, {global.style-fragment.launch-hierarchy}, {global.style-fragment.product-craft}"
        palette:
          - "{global.color.ink}"
          - "{global.color.paper}"
          - "{global.color.warm-stone}"
          - "{global.color.clay}"
          - "{global.color.shell}"
          - "{global.color.graphite}"
          - "{global.color.terminal}"
          - "{global.color.signal-blue}"
        typography: "{global.typography.display-face}; {global.typography.terminal-face}"
        negative: "{global.negative.clean-exclude}"
        references: ["{global.reference.clean-tui}"]
    cafe-product-hero:
      $type: "composite"
      $value:
        prompt: "{global.style-fragment.cafe-product-promo}, {global.style-fragment.tui-product-focus}, {global.style-fragment.warm-technical-palette}, {global.style-fragment.cafe-craft}"
        palette:
          - "{global.color.ink}"
          - "{global.color.paper}"
          - "{global.color.warm-stone}"
          - "{global.color.clay}"
          - "{global.color.shell}"
          - "{global.color.graphite}"
          - "{global.color.terminal}"
          - "{global.color.cafe-wood}"
          - "{global.color.cafe-cream}"
          - "{global.color.signal-blue}"
        typography: "{global.typography.display-face}; {global.typography.terminal-face}"
        negative: "{global.negative.cafe-exclude}"
        references: ["{global.reference.clean-tui}"]
