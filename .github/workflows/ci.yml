# PR / push CI gate.
#
# Runs on every push to main and every pull request. Catches typecheck
# regressions, broken unit tests, and build failures *before* a tag
# push triggers the release workflow against a broken tree.
#
# Behavior tests (test/behavior/) are intentionally NOT in this gate:
#   - They spawn the kobe binary under a PTY via node-pty, which needs
#     terminal sizing the GitHub-hosted Linux runners don't provide.
#   - The terminal-pane test needs tmux installed.
#   - Behavior runtime is ~30s per test; the unit suite is ~10s total.
# Run them locally with `bun run test:behavior` before tagging a release.
# The release workflow skips them too (.github/workflows/release.yml).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight CI for older pushes on the same branch — saves
# minutes when several commits land back-to-back.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  file-size-cap:
    # Hard rule (AGENTS.md "File size cap"): any code file a PR touches must
    # end up ≤500 lines. Only touched files are gated, so legacy oversized
    # files stay green until someone edits them — touch it, you shrink it.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Touched code files must be ≤500 lines
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if printf '%s' "$PR_BODY" | grep -qi 'file-size-exemption'; then
            echo "PR body declares a file-size-exemption — skipping the cap check."
            exit 0
          fi
          fail=0
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            case "$f" in
              refs/*|*.snap|*fixtures/*|*.lock|*.lockb) continue ;;
            esac
            case "$f" in
              *.ts|*.tsx|*.js|*.jsx|*.mjs) ;;
              *) continue ;;
            esac
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 500 ]; then
              echo "::error file=$f::$f is $lines lines (cap ~500). Refactor/split it, or add a 'file-size-exemption: <reason>' line to the PR body. See AGENTS.md 'File size cap'."
              fail=1
            fi
          done < <(git diff --name-only --diff-filter=ACMR "origin/$BASE_REF"...HEAD)
          exit $fail

  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (monorepo)
        # Biome runs first because it's the cheapest check (~50ms) — fail
        # fast on style/format drift before we burn minutes on tsc + tests
        # + build. Biome at root sees all packages.
        run: bun run lint

      - name: Typecheck (kobe package)
        # Workspaces hoist deps; per-package commands run via `bun --filter`.
        run: bun run typecheck

      - name: Unit tests (kobe package)
        working-directory: packages/kobe
        run: bun x vitest run test/cli test/tui test/types test/orchestrator test/engine test/state --passWithNoTests

      - name: Build (kobe package)
        run: bun run build
