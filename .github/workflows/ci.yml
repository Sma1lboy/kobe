# PR / push CI gate.
#
# Runs on every push to main and every pull request. Catches typecheck
# regressions, broken unit tests, and build failures *before* a tag
# push triggers the release workflow against a broken tree.
#
# Behavior tests (test/behavior/) run in their own `behavior` job: they
# drive the BUILT kobe CLI black-box in a temp home + scratch tmux socket
# (tmux is apt-installed on the runner; no real engine binary needed — the
# harness shims a fake `claude`). See docs/HARNESS.md "Behavioral self-test".
#
# coverage-cap (PR only) is the coverage sibling of file-size-cap: every
# packages/kobe/src file a PR touches must meet a line-coverage floor
# (scripts/coverage-gate.mjs; `coverage-exemption: <reason>` in the PR body
# opts out with a paper trail). It also runs `test:render` (the bun-test-only
# .tsx render track, see docs/HARNESS.md "render track") and folds its lcov
# into the same Codecov upload — not yet per-file gated.
#
# changeset-cap (PR only, KOB-10) is the changeset sibling of file-size-cap:
# a PR that touches published-package source (packages/kobe/src or
# packages/kobe-daemon/src, since kobe-daemon ships bundled inside the kobe
# CLI — see docs/RELEASING.md) must add a `.changeset/*.md` file, so a
# release can't silently ship undocumented behavior. Pure tooling/docs/CI
# changes opt out with `bun run changeset -- --empty` (docs/RELEASING.md
# "add a changeset per user-facing change") — Changesets' own escape hatch,
# not a bespoke PR-body comment.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight CI for older pushes on the same branch — saves
# minutes when several commits land back-to-back.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  file-size-cap:
    # Hard rule (AGENTS.md "File size cap"): any code file a PR touches must
    # end up ≤500 lines. Only touched files are gated, so legacy oversized
    # files stay green until someone edits them — touch it, you shrink it.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Touched code files must be ≤500 lines
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Exemptions are PER FILE: each `file-size-exemption: <path> — <reason>`
          # line in the PR body exempts only the exact path it names (a bare
          # reason with no path exempts nothing).
          exempt_paths=$(printf '%s\n' "$PR_BODY" | grep -io 'file-size-exemption:[[:space:]]*[^[:space:]]*' | sed 's/^[^:]*:[[:space:]]*//' || true)
          fail=0
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            case "$f" in
              refs/*|*.snap|*fixtures/*|*.lock|*.lockb) continue ;;
            esac
            case "$f" in
              *.ts|*.tsx|*.js|*.jsx|*.mjs) ;;
              *) continue ;;
            esac
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 500 ]; then
              if [ -n "$exempt_paths" ] && printf '%s\n' "$exempt_paths" | grep -qxF "$f"; then
                echo "::notice file=$f::$f is $lines lines but exempted by the PR body."
                continue
              fi
              echo "::error file=$f::$f is $lines lines (cap ~500). Refactor/split it, or add a 'file-size-exemption: $f — <reason>' line to the PR body. See AGENTS.md 'File size cap'."
              fail=1
            fi
          done < <(git diff --name-only --diff-filter=ACMR "origin/$BASE_REF"...HEAD)
          exit $fail

  changeset-cap:
    # Hard rule sibling (KOB-10, docs/RELEASING.md "add a changeset per
    # user-facing change"): a PR touching the published package's source
    # must carry a `.changeset/*.md` file, or a release can silently ship
    # undocumented behavior. Escape hatch is Changesets' own, not a PR-body
    # comment: `bun run changeset -- --empty` for tooling/docs/CI-only PRs.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: User-facing PRs must add a changeset
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          # "User-facing" == touches published-package source. kobe-daemon
          # is private/unpublished but ships bundled inside the kobe CLI
          # (see docs/RELEASING.md), so it counts too; test/docs/config
          # changes in either package do not.
          touches_user_facing=0
          while IFS= read -r f; do
            case "$f" in
              packages/kobe/src/*|packages/kobe-daemon/src/*) touches_user_facing=1 ;;
            esac
          done < <(git diff --name-only --diff-filter=ACMR "origin/$BASE_REF"...HEAD)

          if [ "$touches_user_facing" -eq 0 ]; then
            echo "No published-package source touched — changeset gate is a no-op."
            exit 0
          fi

          has_changeset=$(git diff --name-only --diff-filter=A "origin/$BASE_REF"...HEAD -- '.changeset/*.md' | grep -v README.md || true)
          if [ -z "$has_changeset" ]; then
            echo "::error::This PR touches packages/kobe/src or packages/kobe-daemon/src but adds no .changeset/*.md. Run 'bun run changeset' to record the user-facing change, or 'bun run changeset -- --empty' if this is tooling-only. See docs/RELEASING.md."
            exit 1
          fi
          echo "ok — changeset(s): $has_changeset"

  typecheck-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (monorepo)
        # Biome runs first because it's the cheapest check (~50ms) — fail
        # fast on style/format drift before we burn minutes on tsc + tests
        # + build. Biome at root sees all packages.
        run: bun run lint

      - name: Typecheck (kobe package)
        # Workspaces hoist deps; per-package commands run via `bun --filter`.
        run: bun run typecheck

      - name: Unit tests (kobe package)
        working-directory: packages/kobe
        run: bun x vitest run test/cli test/tui test/types test/orchestrator test/engine test/state --passWithNoTests

      - name: Build (kobe package)
        run: bun run build

  behavior:
    # Black-box behavior suite: the BUILT CLI in a temp KOBE_HOME + scratch
    # tmux socket, driven the way the demo-video capture drives kobe
    # (send-keys / capture-pane). Catches the environment-dependent CLI/TUI
    # regressions (doctor/update/pane-focus class) unit mocks can't see.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install tmux
        run: sudo apt-get update -q && sudo apt-get install -y -q tmux

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (kobe package)
        run: bun run build

      - name: Behavior tests (kobe package)
        run: bun run --filter @sma1lboy/kobe test:behavior

  coverage-cap:
    # Per-touched-file coverage floor (the coverage sibling of file-size-cap)
    # + the Codecov upload that feeds the README badge. Runs on push too so
    # main's coverage stays current; the touched-file GATE step is PR-only.
    # No repo-wide % gate — only files a PR touches must clear the bar, so
    # coverage ratchets up where work actually happens.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Coverage (kobe package)
        working-directory: packages/kobe
        run: bun run coverage

      - name: Render-track coverage (kobe package .tsx)
        # bun test + @opentui/solid's testRender (docs/HARNESS.md "render
        # track") — the only runner that can execute opentui Solid
        # components at all. Separate report; not gated per-file (yet), just
        # folded into the Codecov upload below so the repo-wide badge
        # reflects .tsx too.
        working-directory: packages/kobe
        run: bun run test:render

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/kobe/coverage/lcov.info,packages/kobe/coverage-render/lcov.info
          fail_ci_if_error: false

      - name: Touched files must meet the coverage floor
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: bun scripts/coverage-gate.mjs
