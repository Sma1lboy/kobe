
name: Deploy Landing

on:
  push:
    branches: [main]
    paths:
      - "packages/kobe-landing/**"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

concurrency:
  group: deploy-landing
  cancel-in-progress: true

permissions:
  contents: read

env:
  VERCEL_ORG_ID: team_n5to97TvbHckLXmLCO4UgWfr
  VERCEL_PROJECT_ID: prj_acjfxehU5fxWLLzVVBdN2rM1c8hj

jobs:
  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        working-directory: packages/kobe-landing
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
        working-directory: packages/kobe-landing
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy (prebuilt) to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        working-directory: packages/kobe-landing
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
