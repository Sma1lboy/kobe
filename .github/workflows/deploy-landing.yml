# Landing-page auto-deploy.
#
# Deploys the marketing site (`packages/kobe-landing`, a static HTML site)
# to Vercel production (project `kobe-landing`, kobe.sma1lboy.me) whenever
# the landing files change on `main`. This exists because the Vercel CLI
# can't always run from a local machine behind a TLS-intercepting network
# (node's fetch fails cert verification); a GitHub-hosted runner has a clean
# network, so CI is the reliable path to ship a merged landing change.
#
# Trigger: a push to `main` that touches `packages/kobe-landing/**` (or this
# workflow), plus a manual `workflow_dispatch` so a change that already
# landed can be deployed on demand (the first run after this workflow is
# added won't have an auto-trigger).
#
# Required repo secret:
#   - VERCEL_TOKEN: a Vercel access token (Vercel dashboard → Settings →
#     Tokens → Create), scoped to the team that owns the `kobe-landing`
#     project. Add with: `gh secret set VERCEL_TOKEN`.
#
# The org/project IDs below are NOT secrets (they're the identifiers from
# the gitignored `.vercel/project.json`); `vercel pull` uses them to
# recreate the project link on the runner.

name: Deploy Landing

on:
  push:
    branches: [main]
    paths:
      - "packages/kobe-landing/**"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

# One production deploy at a time; cancel an older in-flight deploy when a
# newer landing change lands.
concurrency:
  group: deploy-landing
  cancel-in-progress: true

permissions:
  contents: read

env:
  VERCEL_ORG_ID: team_n5to97TvbHckLXmLCO4UgWfr
  VERCEL_PROJECT_ID: prj_acjfxehU5fxWLLzVVBdN2rM1c8hj

jobs:
  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        working-directory: packages/kobe-landing
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
        working-directory: packages/kobe-landing
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy (prebuilt) to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        working-directory: packages/kobe-landing
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
