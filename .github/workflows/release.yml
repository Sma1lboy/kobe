# Release pipeline.
#
# Trigger: pushing a `vX.Y.Z` tag, OR a prerelease tag `vX.Y.Z-<id>.<n>`
# (e.g. `v0.6.1-experimental.0`). A plain semver tag publishes to the npm
# `latest` dist-tag and a normal GitHub release; a prerelease tag
# publishes to a dist-tag named after the prerelease identifier (the
# `experimental` in `0.6.1-experimental.0`) and marks the GitHub release
# as a prerelease — so `npm i @sma1lboy/kobe` keeps getting the stable
# line while testers opt in with `npm i @sma1lboy/kobe@experimental`.
#
# Two job families run in parallel after the tag lands:
#
#   `publish`   — gates (typecheck/test/build) → npm publish → create
#                 the GitHub Release shell with the extracted CHANGELOG
#                 notes.
#   `binaries`  — matrix per OS+arch. Each runner builds the standalone
#                 `kobe` executable for its native platform
#                 (no cross-compile: `@opentui/core` resolves
#                 `@opentui/core-${platform}-${arch}` via a runtime
#                 template-literal import, and the matching native
#                 subpackage carries `os`/`cpu` restrictions that block
#                 install on foreign hosts), tarballs them, and appends
#                 the artifact to the release. `softprops/action-gh-release`
#                 is idempotent on the same `tag_name`, so the matrix
#                 jobs upload concurrently without stomping each other.
#
# Required repo secrets:
#   - NPM_TOKEN: an npm automation token (Settings → Access Tokens
#     → Generate New Token → Automation). Must have publish rights
#     on the @sma1lboy scope.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

# Default permissions are set to read-only for security; the publish
# job re-grants only what it actually needs.
permissions:
  contents: read

jobs:
  behavior:
    # Same black-box behavior suite ci.yml's PR gate runs (isolated daemon/PTY
    # host + fake `claude` shim — see docs/HARNESS.md "Behavioral self-test"). The
    # release gate must not be weaker than the PR gate; `publish` waits on
    # this so a behavior regression blocks the tag from reaching npm.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (kobe package)
        run: bun run build

      - name: Behavior tests (kobe package)
        run: bun run --filter @sma1lboy/kobe test:behavior

  render-track:
    # Match the required PR render track: real OpenTUI components need Bun's
    # native renderer, and the stable product path is macOS.
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Render tests and coverage (kobe package)
        working-directory: packages/kobe
        run: bun run test:render

  visual-ground-truth:
    # node-pty's macOS x64 prebuild ships an unsigned spawn-helper. Sign the
    # native pair below before exercising the real browser → PTY → OpenTUI path.
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Ad-hoc sign node-pty's macOS native pair
        run: |
          find node_modules/.bun -type f \( -name pty.node -o -name spawn-helper \) -path '*/node-pty/prebuilds/darwin-*/*' -print0 \
            | xargs -0 codesign --force --sign -

      - name: Install Chromium for the visual ground-truth harness
        working-directory: packages/kobe-web
        run: bunx playwright install chromium

      - name: Visual journey (browser → PTY → real OpenTUI)
        working-directory: packages/kobe-web
        run: bun run visual

  publish:
    needs: [behavior, render-track, visual-ground-truth]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for creating the GitHub release
      id-token: write   # for npm provenance (OIDC)
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history so the release notes / future tooling can
          # reach back if needed.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (monorepo)
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        # `bun run test` = test:fast + test:socket (same as ci.yml's PR gate —
        # the release gate must not be weaker than the PR gate). Behavior
        # tests already ran in the required behavior job above.
        working-directory: packages/kobe
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify tag matches package.json
        working-directory: packages/kobe
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag $TAG_VERSION does not match packages/kobe/package.json version $PKG_VERSION"
            echo "Bump packages/kobe/package.json before tagging, or retag after bumping."
            exit 1
          fi
          echo "tag and packages/kobe/package.json agree on $PKG_VERSION"

      - name: Resolve release channel
        id: channel
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # A prerelease version carries a `-<id>.<n>` suffix. The npm
          # dist-tag is the prerelease identifier (`experimental` from
          # `0.6.1-experimental.0`); a plain semver goes to `latest`.
          if [[ "$VERSION" == *-* ]]; then
            PRE="${VERSION#*-}"
            DIST_TAG="${PRE%%.*}"
            echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "publishing $VERSION to npm dist-tag '$DIST_TAG' (prerelease)"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "publishing $VERSION to npm dist-tag 'latest'"
          fi

      - name: Extract changelog section
        id: changelog
        working-directory: packages/kobe
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Pull everything between this version's heading and the next one.
          # Matches BOTH the legacy hand-written format (`## [0.6.9] - date`)
          # and the Changesets format (`## 0.7.0`), so old tags still extract.
          # awk is happier than sed for this multi-line slice.
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[?" ver "([]). -]|$)" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$(echo "$NOTES" | tr -d '[:space:]')" ]; then
            NOTES="See [CHANGELOG.md](./packages/kobe/CHANGELOG.md) for details."
          fi
          {
            echo 'notes<<CHANGELOG_EOF'
            echo "$NOTES"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        # Workspaces hoist deps to root; `npm publish` still runs
        # against the package's own dir.
        working-directory: packages/kobe
        run: npm publish --access public --provenance --tag "${{ steps.channel.outputs.dist_tag }}"

      - name: Create GitHub release
        # Creates the release shell with the changelog notes. The
        # `binaries` matrix appends executables to this same release
        # via subsequent `softprops/action-gh-release` invocations
        # against the same `tag_name`.
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ steps.channel.outputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  binaries:
    # Wait for `publish` so the release shell exists before we append
    # binaries; also avoids burning four runners on a release that fails
    # the typecheck/test/build gate.
    needs: publish
    permissions:
      contents: write   # appending assets to the release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14            # Apple Silicon host (only Mac target)
            asset: kobe-darwin-arm64
          - runner: ubuntu-latest       # x86_64 host
            asset: kobe-linux-x64
          - runner: ubuntu-24.04-arm    # Graviton-class arm64 host
            asset: kobe-linux-arm64
          # macOS Intel (darwin-x64) intentionally dropped — no longer
          # targeting Intel Macs, and the macos-13 runner queue stalled
          # releases waiting for a host.
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        # Each runner installs its own platform's `@opentui/core-*`
        # native subpackage automatically via optional dependencies.
        run: bun install --frozen-lockfile

      - name: Compile standalone binaries
        working-directory: packages/kobe
        run: bun run scripts/compile.ts

      - name: Tar binary
        # Tar from inside release-bin so the archive contains the bare
        # `kobe` binary at the root — users can extract straight onto
        # their PATH directory.
        working-directory: packages/kobe/release-bin
        run: tar -czf "${{ matrix.asset }}.tar.gz" kobe

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: packages/kobe/release-bin/${{ matrix.asset }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
