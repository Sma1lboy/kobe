
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for creating the GitHub release
      id-token: write   # for npm provenance (OIDC)
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        working-directory: packages/kobe
        run: bun x vitest run test/cli test/tui test/types test/orchestrator test/engine test/state --passWithNoTests

      - name: Build
        run: bun run build

      - name: Verify tag matches package.json
        working-directory: packages/kobe
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag $TAG_VERSION does not match packages/kobe/package.json version $PKG_VERSION"
            echo "Bump packages/kobe/package.json before tagging, or retag after bumping."
            exit 1
          fi
          echo "tag and packages/kobe/package.json agree on $PKG_VERSION"

      - name: Resolve release channel
        id: channel
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *-* ]]; then
            PRE="${VERSION#*-}"
            DIST_TAG="${PRE%%.*}"
            echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "publishing $VERSION to npm dist-tag '$DIST_TAG' (prerelease)"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "publishing $VERSION to npm dist-tag 'latest'"
          fi

      - name: Extract changelog section
        id: changelog
        working-directory: packages/kobe
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[?" ver "([]). -]|$)" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$(echo "$NOTES" | tr -d '[:space:]')" ]; then
            NOTES="See [CHANGELOG.md](./packages/kobe/CHANGELOG.md) for details."
          fi
          {
            echo 'notes<<CHANGELOG_EOF'
            echo "$NOTES"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        working-directory: packages/kobe
        run: npm publish --access public --provenance --tag "${{ steps.channel.outputs.dist_tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ steps.channel.outputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  binaries:
    needs: publish
    permissions:
      contents: write   # appending assets to the release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14            # Apple Silicon host (only Mac target)
            asset: kobe-darwin-arm64
          - runner: ubuntu-latest       # x86_64 host
            asset: kobe-linux-x64
          - runner: ubuntu-24.04-arm    # Graviton-class arm64 host
            asset: kobe-linux-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile standalone binaries
        working-directory: packages/kobe
        run: bun run scripts/compile.ts

      - name: Tar binary
        working-directory: packages/kobe/release-bin
        run: tar -czf "${{ matrix.asset }}.tar.gz" kobe

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: packages/kobe/release-bin/${{ matrix.asset }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
