  .rel-head{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
  .rel-tag{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:24px;letter-spacing:-0.02em;color:#eae7df;text-decoration:none;}
  .rel-tag:hover{color:#cc785c;}
  .rel-date{font-size:12.5px;color:#6b655c;}
  .rel-badge{font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;border:1px solid rgba(214,168,92,0.4);background:rgba(214,168,92,0.1);color:#d6a85c;border-radius:6px;padding:3px 8px;}
  .rel-badge.latest{border-color:rgba(154,202,134,0.45);background:rgba(154,202,134,0.08);color:#9aca86;}
  .rel-body{border:1px solid #2c2823;border-radius:13px;background:#171614;padding:22px 26px;}
  .rn-h{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;letter-spacing:0.04em;text-transform:uppercase;color:#cc785c;margin:18px 0 12px;}
  .rn-h:first-child{margin-top:0;}
  .rn-ul{list-style:none;display:flex;flex-direction:column;gap:11px;}
  .rn-ul li{position:relative;padding-left:20px;font-size:14px;line-height:1.6;color:#bdb6aa;}
  .rn-ul li::before{content:"";position:absolute;left:2px;top:9px;width:6px;height:6px;border-radius:50%;background:#cc785c;opacity:0.7;}
  .rn-p{font-size:14px;line-height:1.6;color:#bdb6aa;margin:10px 0;}
  .rn-ul code,.rn-p code,.rn-ul li code{font-family:'JetBrains Mono',monospace;font-size:12.5px;background:#211f1c;border:1px solid #322d27;border-radius:5px;padding:1px 6px;color:#e6c1b1;}
  .rn-ul strong,.rn-p strong{color:#eae7df;font-weight:600;}
  .rn-ul a,.rn-p a{color:#d98c72;text-decoration:none;border-bottom:1px solid rgba(217,140,114,0.3);}
  .rn-ul a:hover,.rn-p a:hover{color:#e6c1b1;}
  @media(max-width:760px){.rel-body{padding:18px 18px;}.rel-tag{font-size:21px;}}

  <!-- HEADER -->

<script>
  // live GitHub star count (shared with the home page; cache for instant paint)
  (function () {
    var el = document.getElementById('starCount');
    if (!el) return;
    function render(n) { el.textContent = n >= 1000 ? (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k' : String(n); }
    try { var c = JSON.parse(localStorage.getItem('kobe_stars') || 'null'); if (c && typeof c.n === 'number') render(c.n); } catch (e) {}
    fetch('https://api.github.com/repos/Sma1lboy/kobe')
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) { if (!d || typeof d.stargazers_count !== 'number') return; render(d.stargazers_count); try { localStorage.setItem('kobe_stars', JSON.stringify({ n: d.stargazers_count })); } catch (e) {} })
      .catch(function () { if (el.textContent === '–') el.textContent = '☆'; });
  })();

  // release timeline — fetched live from the GitHub Releases API, rendered with a
  // tiny markdown subset (headings / bullets / code / bold / links) that the
  // changeset-generated notes use. No build step: a new release shows up here
  // the moment GitHub publishes it.
  (function () {
    var host = document.getElementById('releases');
    var loading = document.getElementById('loading');
    if (!host) return;

    function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function inline(s) {
      s = esc(s);
      s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
      s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
      return s;
    }
    function mdToHtml(md) {
      var lines = String(md || '').split(/\r?\n/), out = [], inList = false;
      function closeList() { if (inList) { out.push('</ul>'); inList = false; } }
      for (var i = 0; i < lines.length; i++) {
        var ln = lines[i];
        var h = ln.match(/^\s*(#{1,6})\s+(.*)$/);
        if (h) { closeList(); out.push('<div class="rn-h">' + inline(h[2]) + '</div>'); continue; }
        var li = ln.match(/^\s*[-*]\s+(.*)$/);
        if (li) { if (!inList) { out.push('<ul class="rn-ul">'); inList = true; } out.push('<li>' + inline(li[1]) + '</li>'); continue; }
        if (ln.trim() === '') { closeList(); continue; }
        closeList(); out.push('<p class="rn-p">' + inline(ln) + '</p>');
      }
      closeList();
      return out.join('') || '<p class="rn-p" style="color:#6b655c;">No notes for this release.</p>';
    }
    function fmtDate(iso) {
      try { return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }); }
      catch (e) { return ''; }
    }

    fetch('https://api.github.com/repos/Sma1lboy/kobe/releases?per_page=100')
      .then(function (r) { if (!r.ok) throw new Error('http ' + r.status); return r.json(); })
      .then(function (rels) {
        if (!Array.isArray(rels) || rels.length === 0) {
          loading.innerHTML = 'No releases yet. See <a href="https://github.com/Sma1lboy/kobe/releases" style="color:#d98c72;">GitHub</a>.';
          return;
        }
        var html = rels.map(function (rel, idx) {
          var tag = esc(rel.tag_name || rel.name || '');
          var badge = idx === 0
            ? '<span class="rel-badge latest">latest</span>'
            : (rel.prerelease ? '<span class="rel-badge">prerelease</span>' : '');
          return '<article class="rel">' +
            '<div class="rel-head">' +
              '<a class="rel-tag" href="' + esc(rel.html_url || '#') + '" target="_blank" rel="noopener">' + tag + '</a>' +
              badge +
              '<span class="rel-date">' + fmtDate(rel.published_at || rel.created_at) + '</span>' +
            '</div>' +
            '<div class="rel-body">' + mdToHtml(rel.body) + '</div>' +
          '</article>';
        }).join('');
        host.innerHTML = html;
      })
      .catch(function () {
        loading.innerHTML = 'Couldn’t load releases (GitHub API). See the full list on <a href="https://github.com/Sma1lboy/kobe/releases" style="color:#d98c72;">GitHub ↗</a>.';
      });
  })();
</script>
