patterns:
  - id: "terminal-first"
    description: "The real kobe TUI should be the dominant readable product surface."
  - id: "sparse-copy"
    description: "Use kobe and parallel agents, one terminal as the primary visible marketing text."
  - id: "no-vendor-marks"
    description: "Avoid official Anthropic or Claude marks outside incidental terminal UI text from screenshots."
  - id: "mars-field-terminal-hero"
    description: "For campaign-specific sci-fi field scenes, keep kobe's terminal screen dominant and readable, with the human/operator smaller than the product surface."
  - id: "voxel-field-terminal-hero"
    description: "For MC End-inspired voxel scenes, keep the environment campaign-specific, avoid official game marks, and preserve kobe's terminal screen as the primary readable subject."
